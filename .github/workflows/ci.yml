name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Syntax check all PHP files
        run: |
          find webapi/ -name '*.php' -print0 | xargs -0 -n1 php -l
          if [ -f ui/index.php ]; then php -l ui/index.php; fi

  lint-js:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts || true

      - name: Lint JavaScript
        run: |
          if [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc.yml ]; then
            npx eslint ui/modules/ --ext .js
          else
            echo "ESLint not yet configured, skipping"
          fi

  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: curl, json, sqlite3
          tools: composer

      - name: Install dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          fi

      - name: Run PHPUnit tests
        run: |
          if [ -d tests ] && [ -f vendor/bin/phpunit ]; then
            ./vendor/bin/phpunit tests/
          else
            echo "No tests configured yet, skipping"
          fi

  build-spk:
    name: Build SPK Package
    runs-on: ubuntu-latest
    needs: [lint-php, lint-js]
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: |
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          else
            echo "Build script not yet created, skipping"
          fi

      - name: Upload SPK artifact
        if: success() && hashFiles('build/*.spk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: spk-package
          path: build/*.spk

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.title, '[UI]') ||
      github.event_name == 'pull_request' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'ui')
    needs: [build-spk]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
