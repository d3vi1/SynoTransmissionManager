name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Syntax check all PHP files
        run: |
          find webapi/ -name '*.php' -print0 | xargs -0 -n1 php -l
          find tests/ -name '*.php' -print0 | xargs -0 -n1 php -l
          if [ -f ui/index.php ]; then php -l ui/index.php; fi

  lint-js:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: |
          JS_FILES=$(find ui/modules/ ui/config/ -name '*.js' 2>/dev/null || true)
          if [ -n "$JS_FILES" ]; then
            npx eslint $JS_FILES
          else
            echo "No JS files to lint"
          fi

  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest
    needs: [lint-php]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: curl, json, sqlite3
          tools: composer
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit --coverage-clover build/coverage/clover.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: build/coverage/
          retention-days: 7

  build-spk:
    name: Build SPK Package
    runs-on: ubuntu-latest
    needs: [lint-php, lint-js, test-php]
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload SPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spk-package
          path: build/*.spk

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' && (
        contains(github.event.pull_request.title, '[UI]') ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'ui')
      )
    needs: [build-spk]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
